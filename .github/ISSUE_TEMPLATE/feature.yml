name: Feature
description: Propose or define a new feature
title: '[Feature] '
labels: ['feature']
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Complete this form so the feature can be reviewed quickly and implemented safely.
        Keep scope tight and list unknowns explicitly.

  - type: input
    id: domain_area
    attributes:
      label: Domain Area
      placeholder: Listings / Orders / Escrow / Ledger / Payments / Disputes / Observability / Infrastructure
    validations:
      required: true

  - type: dropdown
    id: financial_impact
    attributes:
      label: Financial Impact
      options:
        - None
        - Indirect
        - Direct (Non-Critical)
        - Critical (Ledger/Settlement)
    validations:
      required: true

  - type: dropdown
    id: risk_level
    attributes:
      label: Risk Level
      options:
        - Low
        - Medium
        - High
        - Critical (Financial)
    validations:
      required: true

  - type: dropdown
    id: architecture_change
    attributes:
      label: Architecture Change?
      options:
        - No
        - Minor Refactor
        - New Aggregate
        - New Event
        - Cross-Context Change
    validations:
      required: true

  - type: textarea
    id: user_story
    attributes:
      label: User Story
      placeholder: |
        As a ...
        I want to ...
        So that ...
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: Must be testable and unambiguous
      placeholder: |
        - ...
    validations:
      required: true

  - type: textarea
    id: invariants
    attributes:
      label: Domain Invariants Impacted
      description: List invariants introduced or modified
      placeholder: |
        - Escrow cannot be released twice
        - Ledger must remain balanced

  - type: textarea
    id: event_changes
    attributes:
      label: Event Model Impact
      description: New or modified domain/integration events
      placeholder: |
        - EscrowPartiallyRefunded.v1
        - OrderStatusChanged.v1

  - type: textarea
    id: risks
    attributes:
      label: Identified Risks
      description: Technical, financial, and operational risks
      placeholder: |
        - Concurrency issues
        - Duplicate event risk

  - type: textarea
    id: testing_strategy
    attributes:
      label: Testing Strategy
      placeholder: |
        - Unit tests for aggregate invariants
        - Integration tests for event publishing

  - type: checkboxes
    id: readiness_checklist
    attributes:
      label: Definition of Ready
      options:
        - label: Acceptance criteria clearly defined
        - label: Financial impact reviewed
        - label: Risks identified
        - label: Architecture implications considered
